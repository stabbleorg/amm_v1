[workspace]
members = [
    "programs/*"
]
resolver = "2"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1

[workspace.dependencies]
anchor-lang = "0.30.1"
anchor-spl = "0.30.1"
anchor-common = { git = "https://github.com/stabbleorg/anchor-common.git", rev = "1463700c653df2613baaf1e2512370564b399e37" }
bn = { git = "https://github.com/stabbleorg/amm-sdk.git", rev = "1827bdbaf24bf1e21d4bd606ff436afde973a9ea" }
math = { git = "https://github.com/stabbleorg/amm-sdk.git", rev = "1827bdbaf24bf1e21d4bd606ff436afde973a9ea" }
