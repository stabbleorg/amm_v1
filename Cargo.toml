[workspace]
members = [
    "programs/*"
]
resolver = "2"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1

[workspace.dependencies]
anchor-lang = "0.31.0"
anchor-spl = "0.31.0"
anchor-common = { git = "https://github.com/stabbleorg/anchor-common.git", rev = "d44abfdac69e158759ba8a130acd929ff26378f4" }
# bn = { git = "https://github.com/stabbleorg/amm-sdk.git", rev = "1827bdbaf24bf1e21d4bd606ff436afde973a9ea" }
# math = { git = "https://github.com/stabbleorg/amm-sdk.git", rev = "1827bdbaf24bf1e21d4bd606ff436afde973a9ea" }
bn = { path = "../amm-sdk/libraries/bn" }
math = { path = "../amm-sdk/libraries/math" }
