[workspace]
members = [
    "programs/*"
]
resolver = "2"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1

[workspace.dependencies]
anchor-lang = "0.30.1"
anchor-spl = "0.30.1"
anchor-common = { git = "https://github.com/stabbleorg/anchor-common.git" }
solana-program = "1.18.23"
bn = { git = "https://github.com/stabbleorg/amm-sdk.git", rev = "f15d379afe801dec49e214e88ee14e01493c5a06" }
math = { git = "https://github.com/stabbleorg/amm-sdk.git", rev = "f15d379afe801dec49e214e88ee14e01493c5a06" }
