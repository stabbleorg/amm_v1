[toolchain]
anchor_version = "0.30.0"
solana_version = "1.18.12"

[features]
resolution = false
skip-lint = false

[programs.localnet]
stable_swap = "swapNyd8XiQwJ6ianp9snpu4brUqFxadzvHebnAXjJZ"
weighted_swap = "swapFpHZwjELNnjvThjajtiVmkz3yPQEHjLtka2fwHW"
vault = "vo1tWgqZMjG61Z2T9qUaMYKqZ75CYzMuaZ2LZP1n7HV"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[workspace]
types = "packages/sdk/src/generated/"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.spec.ts"

[test]
startup_wait = 100000
shutdown_wait = 2000
upgradeable = false
